constraints:
  - id: CON-001
    title: Template Root And Historical Immutability
    statement: >-
      `000_template` is the global schema root and is never runnable, and
      finished experiments and finished bases remain immutable runtime-defining
      history.
    rationale: >-
      Template and historical experiment roots anchor reproducibility and must
      not silently change runtime meaning after they have been used.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - README.md#key-concepts
      - CONTRIBUTING.md#normal-contribution-workflow
      - plan.md#core-decisions
  - id: CON-002
    title: Runtime And Deploy Target Stay Separate
    statement: >-
      `runtime.train_runtime` and deployment target or track remain separate
      concepts, and non-base experiments must not switch deployment target
      mid-chain.
    rationale: >-
      Runtime backend selection answers where a run executes, while deployment
      target answers what kind of system the experiment is meant to support.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - plan.md#deployment-track-model
      - plan.md#validation-and-error-handling
  - id: CON-003
    title: Python And C++ Ownership Boundary
    statement: >-
      Python owns authored config loading, resolution, dataset expansion,
      policy checks, orchestration, and comparison, while C++ owns one resolved
      child run at a time.
    rationale: >-
      The project depends on a narrow trainer boundary to avoid reimplementing
      orchestration logic inside the runtime layer.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - README.md#how-it-works
      - CONTRIBUTING.md#choose-the-right-contribution-surface
      - plan.md#orchestration-boundaries
  - id: CON-004
    title: Phase 1 Run Profiles And Fallback
    statement: >-
      Phase 1 run profiles are only `short` and `full`, and accelerated requests
      may fall back to CPU only for short local runs when no accelerated backend
      is available.
    rationale: >-
      Short runs are the designated fast-feedback loop, while canonical full
      runs must preserve the intended runtime contract.
    severity: medium
    owner: runtime
    status: accepted
    source_refs:
      - README.md#short-runs
      - plan.md#core-decisions
      - plans/mock_implementation_learned.md#stage-4-environment-detection-and-libtorch-download
  - id: CON-005
    title: Text-First Versioned Artifacts
    statement: >-
      Runtime artifacts, compare outputs, and planning outputs remain
      text-first, versioned, and reviewable, and opaque generated artifacts do
      not become the canonical collaboration surface.
    rationale: >-
      The contribution model relies on Git-friendly artifacts that humans can
      inspect and discuss without hidden state.
    severity: high
    owner: collaboration
    status: accepted
    source_refs:
      - README.md#run-artifacts
      - CONTRIBUTING.md#contribution-checksum
      - plan.md#artifact-contract
      - plans/collaboration-risk-matrix.md#r10-git-friendly-collaboration-surfaces
  - id: CON-006
    title: Project-Wide LibTorch Pinning
    statement: >-
      LibTorch versioning is controlled by one project-wide lock file with exact
      package checksums, and newer releases may warn but must not auto-upgrade
      the pinned project version.
    rationale: >-
      Toolchain reproducibility depends on one shared dependency contract rather
      than ad hoc version selection by environment or experiment.
    severity: high
    owner: build
    status: accepted
    source_refs:
      - README.md#quick-start
      - plan.md#build-and-bootstrap
      - plans/mock_implementation_learned.md#stage-4-environment-detection-and-libtorch-download
  - id: CON-007
    title: Strict Phase 1 Dataset Metadata
    statement: >-
      Phase 1 dataset metadata is strict: persisted `metadata.json` contains
      only `input_channels` and `num_classes`, and cache reuse requires valid
      metadata plus a configured sentinel when one exists.
    rationale: >-
      Shared dataset preparation needs a small, testable contract before the
      project can safely expand metadata shape or cache semantics.
    severity: medium
    owner: datasets
    status: accepted
    source_refs:
      - README.md#dataset-preparation
      - plan.md#dataset-catalog-contract
      - plans/mock_implementation_learned.md#stage-3-dataset-catalog-and-preparation
  - id: CON-008
    title: Canonical Python Environment Discipline
    statement: >-
      The documented Python entrypoints are `uv` plus `python -m`, and setup,
      doctor, build, and run flows do not rely on a second Python environment
      contract.
    rationale: >-
      One Python workflow keeps contributor setup legible and reduces hidden
      environment drift across host, container, and CI usage.
    severity: medium
    owner: environment
    status: accepted
    source_refs:
      - README.md#quick-start
      - CONTRIBUTING.md#intended-setup-flow
      - plan.md#developer-task-aliases-and-ci
      - plans/collaboration-risk-matrix.md#r9-python-environment-discipline
  - id: CON-009
    title: Stage Exit And Blocking Unknown Rule
    statement: >-
      Every stage plan must keep non-empty Coverage, Done Criteria, and Test
      Gate sections, and no stage may be treated as ready or complete while it
      depends on an open blocking unknown.
    rationale: >-
      The staged-delivery model works only if each stage carries explicit scope,
      verification, and unresolved-scope handling instead of vague readiness.
    severity: high
    owner: planning
    status: accepted
    source_refs:
      - plan-stages.md#stage-exit-rule
      - plans/stages/01_foundation/plan.md
      - plans/trace/coverage.md
  - id: CON-010
    title: Flat And Explicit FPGA Profiles
    statement: >-
      FPGA deploy profiles are flat explicit named profiles and do not inherit
      or compose implicitly.
    rationale: >-
      FPGA validation and promotion rules must remain auditable, and a flat
      profile model avoids hidden constraint inheritance inside the deployment
      path.
    severity: medium
    owner: deployment
    status: accepted
    source_refs:
      - plan.md#deployment-track-model
      - plans/decisions/ADR-0012-flat-and-explicit-fpga-profiles.md
      - plans/mock_implementation_learned.md#stage-9-fpga-deployment-extension
      - plans/stages/09_fpga_deployment/plan.md#scope
  - id: CON-011
    title: Git-Based Reproducibility
    statement: >-
      Reproducibility uses the tracked experiment folder in the repo that owns
      it — including `experiment.toml`, experiment-owned `model.cpp`, and
      `notes.md` — plus git provenance and runtime artifacts rather than
      per-run source snapshots.
    rationale: >-
      The project wants reproducible runs without multiplying opaque source
      archives inside runtime outputs, and it treats the authored experiment
      folder as the durable human-owned record of the experiment.
    severity: high
    owner: collaboration
    status: accepted
    source_refs:
      - README.md#reproducibility-and-git-discipline
      - plan.md#core-decisions
      - plan.md#run-metadata-and-tags
  - id: CON-012
    title: Clean-Tree Canonical Full Runs
    statement: >-
      Canonical full runs come from a clean git tree by default, and dirty-tree
      full runs require an explicit override.
    rationale: >-
      The project uses runtime artifacts as review surfaces, so full-run claims
      need a strong default provenance bar.
    severity: medium
    owner: runtime
    status: accepted
    source_refs:
      - README.md#reproducibility-and-git-discipline
      - plan.md#core-decisions
      - plans/stages/06_local_scratch_runs/plan.md#done-criteria
  - id: CON-013
    title: TOML Trains While C++ Defines Architecture
    statement: >-
      TOML config is the place for training and execution concerns such as
      epochs, dataset targets, runtime intent, deployment target, optimizer,
      scheduler, loss, and train-loop settings, while model graph structure,
      activation and normalization choices, quantization parameters, and other
      architecture-defining choices live in per-experiment `model.cpp` files
      plus the shared C++ library; dataset-dependent values such as
      `input_channels` and `num_classes` cross the trainer boundary as runtime
      inputs rather than authored architecture fields.
    rationale: >-
      The project needs a clear three-tier boundary so training behavior stays
      cheap to vary in TOML while architecture and low-level math remain
      readable, portable, and practical in C++.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - plan.md#phase-1-author-config-surface
      - plans/decisions/ADR-0002-resolved-child-run-runtime-contract.md
      - plan.md#registry-and-factory-pattern
      - plans/decisions/ADR-0007-config-selects-code-defines-model-structure.md
      - plans/decisions/ADR-0001-config-first-experiments.md
  - id: CON-014
    title: Base-Rooted Experiment Lineage
    statement: >-
      Non-base experiments extend a base in the same track rather than another
      non-base experiment, scaffolding copies the base `model.cpp` as the new
      experiment's starting architecture file, and reusable implementation
      remains in shared Python and C++ code rather than copied into experiment
      folders.
    rationale: >-
      Base-rooted lineage keeps history legible, prevents daisy-chained
      experiment inheritance from hiding architecture ownership, and avoids
      per-experiment shared-library forks while still allowing experiment-local
      model definition files.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - README.md#key-concepts
      - README.md#quick-start
      - plan.md#inheritance-and-merge-semantics
      - plan.md#scaffolding-workflow
      - plans/decisions/ADR-0001-config-first-experiments.md
  - id: CON-015
    title: Portable Model Code Has No Framework Dependency
    statement: >-
      The experiment-owned `model.cpp` and shared C++ model library must not
      depend on Python orchestration code, TOML model parsing, or
      experiment-inheritance logic in order to compile for production use; any
      dataset-dependent values they need must arrive through a narrow C++ call
      from the trainer rather than framework-only plumbing.
    rationale: >-
      Production-portable experiments are only credible if the model artifact
      boundary excludes the experimentation framework itself.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - plan.md#trainer-contract
      - plan.md#registry-and-factory-pattern
      - plans/decisions/ADR-0009-production-portable-experiment-artifacts.md
  - id: CON-016
    title: TensorBoard Logs Are Derived Visualization Artifacts
    statement: >-
      TensorBoard event logs are derived visualization artifacts generated by
      Python from canonical runtime outputs such as `metrics.csv` and
      `summary.json`, and they must not replace the text-first runtime artifacts
      as the canonical review or reproducibility surface.
    rationale: >-
      The project can support TensorBoard without weakening the text-first
      artifact policy only if the event-log format remains a derived output
      rather than the source of truth.
    severity: medium
    owner: runtime
    status: accepted
    source_refs:
      - README.md#run-artifacts
      - plan.md#artifact-contract
      - plans/decisions/ADR-0010-python-owned-tensorboard-projection.md
  - id: CON-017
    title: Shared C++ Library Is Additive-Stable
    statement: >-
      New behavior in the shared C++ library is introduced as new classes or
      types rather than by modifying existing ones; existing shared library
      classes and their public interfaces are stable once any experiment or
      production artifact references them.
    rationale: >-
      Experiments are deployed to production by copying `model.cpp` plus the
      shared C++ library. If existing shared library classes are modified after
      that copy, the workbench and the production build silently diverge.
      Keeping existing classes stable and extending the library only through
      new additions preserves the production-portability guarantee across
      workbench versions.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - README.md#how-it-works
      - README.md#reproducibility-and-git-discipline
      - plans/decisions/ADR-0011-shared-library-additive-stability.md
  - id: CON-018
    title: Group Folders Are Organization-Only
    statement: >-
      Optional parent folders beneath `experiments/` are organization-only
      namespaces with no runtime, deployment-target, or compiler semantics;
      `experiment.id` must remain repo-unique regardless of path, the leaf
      experiment folder name must equal `experiment.id`, and duplicate ids
      anywhere under `experiments/` are invalid.
    rationale: >-
      Group folders improve repo organization only if they do not become a
      second identity contract. Keeping commands, build roots, run artifacts,
      compare inputs, and checkpoint references keyed by `experiment.id`
      preserves a simple machine-facing surface and keeps C++ build behavior
      path-agnostic.
    severity: high
    owner: architecture
    status: accepted
    source_refs:
      - README.md#quick-start
      - plan.md#experiment-hierarchy
      - plan.md#cli-surface
      - plans/decisions/ADR-0013-grouped-experiment-folders-with-id-based-selection.md
